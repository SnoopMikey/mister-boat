<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Mister Boat — Checklist</title>

<meta name="description" content="A whimsical, nautical checklist for casting off and docking up." />
<meta name="theme-color" content="#F5EDDD" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Mister Boat" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Serif+Display:ital@0;1&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0;
    background: #F5EDDD;
    color: #0B2545;
    font-family: 'Work Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
  }
  /* On desktop, center the app in a phone-width column over a neutral paper background. */
  #app-root {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    background: #F5EDDD;
    position: relative;
  }
  @media (min-width: 500px) {
    html, body { background: #EADFC7; }
    #app-root { box-shadow: 0 0 40px rgba(11,37,69,0.08); }
  }
  @keyframes mb-float {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-5px) rotate(1deg); }
  }
  @keyframes mb-stamp {
    0% { transform: rotate(-8deg) scale(1.6); opacity: 0; }
    60% { transform: rotate(-8deg) scale(0.9); opacity: 1; }
    100% { transform: rotate(-8deg) scale(1); opacity: 1; }
  }
  @keyframes mb-pop {
    0% { transform: scale(0.94); opacity: 0; }
    60% { transform: scale(1.02); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  button:active { transform: translateY(1px); }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
  <div id="app-root"></div>

<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="tweaks-panel.js"></script>
<script src="app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
